name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall app

      - name: Smoke test API (stub engines)
        env:
          EKYC_AI_API_KEY: ci-test-key
          OCR_ENGINE: stub
          FACE_MATCH_ENGINE: stub
          LIVENESS_ENGINE: stub
        run: |
          python -c "from app.main import app; print('app import OK:', app.title)"
